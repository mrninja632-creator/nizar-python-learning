<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NIZAR - Python Tips & Tricks</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <div class="bg-decoration bg-decoration-1"></div>
    <div class="bg-decoration bg-decoration-2"></div>

    <nav>
        <a href="index.html" class="logo">🐍 NIZAR</a>
        <div class="nav-links">
            <a href="glossary.html" class="nav-link">📚 GLOSSARY</a>

        <div class="language-switcher">
            <button class="lang-btn active" onclick="changeLanguage('en')">EN</button>
            <button class="lang-btn" onclick="changeLanguage('fr')">FR</button>
            <button class="lang-btn" onclick="changeLanguage('ar')">AR</button>
        </div>
    </nav>

    <header>
        <h1 id="header-title" data-translate="tip-header-title">💡 Tips & Tricks</h1>
        <p class="tagline" id="header-tagline" data-translate="tip-header-tagline">Pro Tips for Better Python Code</p>

    <div class="container">
        <div class="glossary" id="tips"></div>
    </div>

    <button class="scroll-to-top" id="scrollToTop">↑</button>

    <div class="zoom-controls">
        <button class="zoom-btn" id="zoomOut" title="Zoom Out">−</button>
        <div class="zoom-level" id="zoomLevel">100%</div>
        <button class="zoom-btn" id="zoomIn" title="Zoom In">+</button>
    </div>

    <footer>
        <p data-translate="footer-title">🐍 NIZAR - Learn Python Like Never Before</p>
        <p data-translate="footer-copy">© 2024 NIZAR Learning Platform. All Rights Reserved.</p>
    </footer>

    <script src="translations.js"></script>
    <script src="shared.js"></script>
    <script src="tips.js"></script>
    <script>
        const savedLang = localStorage.getItem('niзarLanguage') || 'en';
        if (savedLang !== 'en') {
            applyTranslations(savedLang);
            document.querySelector(`button[onclick="changeLanguage('${savedLang}')"]`)?.classList.add('active');
        }
    </script>

</body>
